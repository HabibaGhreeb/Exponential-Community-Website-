<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exponential Community — Developer OS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050508;
  --s1:#0C0C14;
  --s2:#12121F;
  --blue:#3B82F6;
  --purple:#8B5CF6;
  --green:#10B981;
  --text:#F1F5F9;
  --sub:#94A3B8;
  --muted:#475569;
  --border:rgba(255,255,255,0.06);
  --border-active:rgba(59,130,246,0.3);
  --glow-blue:rgba(59,130,246,0.15);
  --glow-purple:rgba(139,92,246,0.12);
  --head:'Inter',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--head);font-size:16px;line-height:1.7;overflow-x:hidden;min-height:100vh}

/* CURSOR GLOW */
#cursor-glow{position:fixed;pointer-events:none;z-index:9999;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,0.06) 0%,transparent 70%);transform:translate(-50%,-50%);transition:left 0.6s ease,top 0.6s ease;top:50%;left:50%}

/* BOOT SCREEN */
#boot{position:fixed;inset:0;background:#000;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--mono)}
.boot-term{width:min(500px,90vw);text-align:left}
.boot-line{font-size:0.85rem;color:#3B82F6;line-height:2;opacity:0;animation:bootLine 0.4s ease forwards}
.boot-line.green{color:#10B981}
.boot-line.dim{color:#475569}
.boot-logo{margin-top:2.5rem;text-align:center;opacity:0;animation:fadeIn 1s 3.2s ease forwards}
.boot-logo-text{font-family:var(--head);font-size:2rem;font-weight:900;letter-spacing:-0.04em;background:linear-gradient(135deg,#fff,#3B82F6,#8B5CF6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none;filter:drop-shadow(0 0 40px rgba(59,130,246,0.5))}
.boot-skip{position:fixed;top:1.5rem;right:2rem;background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 16px;border-radius:6px;font-family:var(--mono);font-size:0.75rem;cursor:pointer;z-index:1001;transition:all 0.2s}
.boot-skip:hover{border-color:var(--blue);color:var(--blue)}
@keyframes bootLine{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeIn{from{opacity:0;filter:blur(20px)}to{opacity:1;filter:blur(0)}}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:0 5%;height:64px;background:rgba(5,5,8,0.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);transition:all 0.3s}
.nav-logo{font-weight:900;font-size:1.1rem;letter-spacing:-0.03em;background:linear-gradient(135deg,#fff 0%,var(--blue) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer}
.nav-links{display:flex;gap:0;list-style:none}
.nav-links li a{color:var(--muted);text-decoration:none;font-size:0.85rem;font-weight:500;padding:0 1rem;height:64px;display:flex;align-items:center;transition:color 0.2s;border-bottom:2px solid transparent;cursor:pointer}
.nav-links li a:hover,.nav-links li a.active{color:var(--text);border-bottom-color:var(--blue)}
.nav-right{display:flex;gap:0.75rem;align-items:center}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--sub);padding:8px 18px;border-radius:7px;font-family:var(--head);font-size:0.85rem;font-weight:500;cursor:pointer;transition:all 0.2s}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border:none;padding:9px 22px;border-radius:7px;font-family:var(--head);font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s;box-shadow:0 0 20px rgba(59,130,246,0.2)}
.btn-primary:hover{box-shadow:0 0 40px rgba(59,130,246,0.4);transform:translateY(-1px)}

/* PAGES */
.page{display:none;min-height:100vh;padding-top:64px}
.page.active{display:block}

/* GLOBAL SECTION */
section{padding:7rem 5%}
.inner{max-width:1100px;margin:0 auto}
.mono-tag{font-family:var(--mono);font-size:0.72rem;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--blue);margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.mono-tag::before{content:'>';color:var(--purple)}
.section-title{font-size:clamp(2.2rem,4vw,3.5rem);font-weight:800;letter-spacing:-0.04em;line-height:1.1;margin-bottom:1.2rem}
.section-sub{color:var(--sub);font-size:1.05rem;line-height:1.8;max-width:580px}

/* GLASS CARD */
.glass{background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:16px;transition:all 0.3s;position:relative;overflow:hidden}
.glass::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 30%,rgba(59,130,246,0.04) 0%,transparent 60%);opacity:0;transition:opacity 0.3s;pointer-events:none}
.glass:hover{border-color:rgba(59,130,246,0.25);box-shadow:0 0 40px rgba(59,130,246,0.08);transform:translateY(-2px)}
.glass:hover::before{opacity:1}

/* TAG/BADGE */
.tag{display:inline-flex;align-items:center;gap:6px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:var(--blue);font-family:var(--mono);font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;padding:4px 12px;border-radius:4px}
.tag.green{background:rgba(16,185,129,0.1);border-color:rgba(16,185,129,0.2);color:var(--green)}
.tag.purple{background:rgba(139,92,246,0.1);border-color:rgba(139,92,246,0.2);color:var(--purple)}
.tag.closed{background:rgba(71,85,105,0.1);border-color:rgba(71,85,105,0.2);color:var(--muted)}

/* SCROLL REVEAL */
.reveal{opacity:0;transform:translateY(24px);transition:opacity 0.6s ease,transform 0.6s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

/* ============================================
   HOME PAGE
   ============================================ */

/* HERO */
#home-hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;padding:8rem 5%}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(59,130,246,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.03) 1px,transparent 1px);background-size:80px 80px;z-index:0}
.hero-radial{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);width:900px;height:500px;background:radial-gradient(ellipse,rgba(59,130,246,0.1) 0%,rgba(139,92,246,0.05) 40%,transparent 70%);pointer-events:none;z-index:0}
.hero-content{position:relative;z-index:1;max-width:820px}
.hero-mono{font-family:var(--mono);font-size:0.78rem;color:var(--blue);letter-spacing:0.12em;margin-bottom:1.5rem;opacity:0;animation:fadeUp 0.8s 0.1s ease forwards}
h1.hero-h1{font-size:clamp(3.5rem,9vw,7rem);font-weight:900;letter-spacing:-0.05em;line-height:1;margin-bottom:1.5rem;opacity:0;animation:fadeUp 0.9s 0.2s ease forwards}
h1.hero-h1 em{font-style:normal;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{color:var(--sub);font-size:1.1rem;line-height:1.8;max-width:560px;margin:0 auto 2.5rem;opacity:0;animation:fadeUp 1s 0.3s ease forwards}
.hero-ctas{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;opacity:0;animation:fadeUp 1s 0.4s ease forwards}
.btn-hero{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border:none;padding:14px 32px;border-radius:8px;font-family:var(--head);font-size:1rem;font-weight:600;cursor:pointer;transition:all 0.3s;box-shadow:0 0 40px rgba(59,130,246,0.3)}
.btn-hero:hover{box-shadow:0 0 70px rgba(59,130,246,0.5);transform:translateY(-2px)}
.btn-hero-sec{background:transparent;border:1px solid rgba(255,255,255,0.12);color:var(--text);padding:14px 32px;border-radius:8px;font-family:var(--head);font-size:1rem;font-weight:500;cursor:pointer;transition:all 0.2s}
.btn-hero-sec:hover{border-color:var(--blue);background:rgba(59,130,246,0.05)}
.hero-proof{margin-top:2rem;font-family:var(--mono);font-size:0.78rem;color:var(--muted);opacity:0;animation:fadeUp 1s 0.5s ease forwards}
.hero-proof span{color:var(--green)}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* FLOATING CODE CARDS */
.code-float{position:absolute;background:rgba(12,12,20,0.8);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-family:var(--mono);font-size:0.7rem;color:var(--muted);z-index:1;backdrop-filter:blur(10px)}
.code-float .kw{color:#7dd3fc}.code-float .fn{color:#a78bfa}.code-float .str{color:#6ee7b7}
.cf1{top:25%;left:3%;animation:float1 6s ease-in-out infinite}
.cf2{top:35%;right:3%;animation:float2 7s ease-in-out infinite}
.cf3{bottom:25%;left:8%;animation:float1 8s ease-in-out infinite 1s}
@keyframes float1{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes float2{0%,100%{transform:translateY(0)}50%{transform:translateY(10px)}}

/* DIAGNOSIS */
#diagnosis{background:var(--s1);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.pain-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem;margin-top:3rem}
.pain-card{padding:1.6rem;cursor:default}
.pain-card.highlighted{border-color:rgba(139,92,246,0.3);background:rgba(139,92,246,0.05)}
.pain-card.highlighted::before{opacity:1}
.pain-icon{font-size:1.4rem;margin-bottom:1rem}
.pain-text{font-size:1rem;color:var(--sub);line-height:1.65;font-weight:400}
.pain-text strong{color:var(--text);font-weight:600}

/* SYSTEM OVERVIEW */
#overview{background:var(--bg)}
.pillars{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-top:3rem}
.pillar{padding:2rem}
.pillar-num{font-family:var(--mono);font-size:0.7rem;color:var(--purple);letter-spacing:0.15em;margin-bottom:1.2rem}
.pillar-icon{font-size:2rem;margin-bottom:1rem}
.pillar-title{font-size:1.25rem;font-weight:700;margin-bottom:0.6rem;letter-spacing:-0.02em}
.pillar-desc{color:var(--sub);font-size:0.9rem;line-height:1.7}

/* PROBLEMS */
#problems{background:var(--s1);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.accordion{margin-top:3rem;display:flex;flex-direction:column;gap:1rem}
.acc-item{border-radius:14px;overflow:hidden}
.acc-head{width:100%;display:flex;justify-content:space-between;align-items:center;padding:1.6rem;background:var(--s2);border:1px solid var(--border);cursor:pointer;text-align:left;transition:all 0.2s;border-radius:14px}
.acc-item.open .acc-head{border-bottom-left-radius:0;border-bottom-right-radius:0;border-color:rgba(59,130,246,0.25);background:rgba(59,130,246,0.05)}
.acc-head-title{font-size:1.1rem;font-weight:600;color:var(--text)}
.acc-chevron{color:var(--muted);transition:transform 0.3s;font-size:1.2rem}
.acc-item.open .acc-chevron{transform:rotate(180deg);color:var(--blue)}
.acc-body{display:none;padding:1.8rem;background:var(--s2);border:1px solid rgba(59,130,246,0.15);border-top:none;border-bottom-left-radius:14px;border-bottom-right-radius:14px}
.acc-item.open .acc-body{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.5rem}
.acc-col-label{font-family:var(--mono);font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:0.6rem}
.acc-col-label.red{color:#f87171}.acc-col-label.amber{color:#fbbf24}.acc-col-label.em-green{color:var(--green)}
.acc-col p{color:var(--sub);font-size:0.9rem;line-height:1.7}

/* ACCESS UNLOCK */
#access{background:var(--bg);position:relative;overflow:hidden}
.access-radial{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:800px;height:600px;background:radial-gradient(ellipse,rgba(59,130,246,0.08) 0%,rgba(139,92,246,0.04) 50%,transparent 70%);pointer-events:none}
.access-inner{position:relative;z-index:1;text-align:center}
.access-inner .section-sub{margin:0 auto;margin-bottom:3rem}
.unlock-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;max-width:800px;margin:0 auto}
.unlock-item{padding:1.4rem 1rem;text-align:center;border-radius:12px}
.unlock-item-icon{font-size:1.8rem;margin-bottom:0.6rem}
.unlock-item-name{font-family:var(--mono);font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--sub)}
.unlock-cta{margin-top:3rem}

/* JOURNEY */
#journey{background:var(--s1);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.timeline{position:relative;margin-top:3rem}
.timeline::before{content:'';position:absolute;left:27px;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,var(--blue),var(--purple),transparent)}
.tl-step{position:relative;padding-left:78px;margin-bottom:1.5rem;cursor:pointer}
.tl-dot{position:absolute;left:0;top:18px;width:54px;height:54px;border-radius:50%;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:0.8rem;font-weight:600;color:var(--muted);z-index:1;transition:all 0.3s}
.tl-step.active .tl-dot,.tl-step:hover .tl-dot{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 0 25px rgba(59,130,246,0.4)}
.tl-card{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:1.3rem 1.5rem;transition:all 0.3s}
.tl-step.active .tl-card{border-color:rgba(59,130,246,0.3)}
.tl-card-head{display:flex;align-items:center;justify-content:space-between}
.tl-card-title{font-weight:600;font-size:1rem;letter-spacing:-0.01em}
.tl-you-here{font-family:var(--mono);font-size:0.65rem;color:var(--green);letter-spacing:0.1em;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);padding:3px 8px;border-radius:4px}
.tl-body{color:var(--sub);font-size:0.9rem;line-height:1.7;margin-top:0.8rem;padding-top:0.8rem;border-top:1px solid var(--border);display:none}
.tl-step.active .tl-body{display:block}

/* BOOST BENTO */
#boost{background:var(--bg)}
.bento{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:auto auto;gap:1.2rem;margin-top:3rem}
.bento-card{padding:1.8rem;min-height:160px}
.bento-card.wide{grid-column:span 2}
.bento-card.tall{grid-row:span 2}
.bento-icon{font-size:1.6rem;margin-bottom:0.8rem}
.bento-title{font-weight:700;font-size:1.05rem;margin-bottom:0.4rem;letter-spacing:-0.01em}
.bento-desc{color:var(--sub);font-size:0.88rem;line-height:1.65}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:5px;animation:livePulse 2s infinite}
@keyframes livePulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(16,185,129,0.4)}50%{opacity:0.7;box-shadow:0 0 0 6px rgba(16,185,129,0)}}
.bento-feed{font-family:var(--mono);font-size:0.78rem;color:var(--green);margin-top:0.8rem;padding:10px 12px;background:rgba(16,185,129,0.05);border:1px solid rgba(16,185,129,0.15);border-radius:8px}

/* CINEMATIC CTA */
#cin-cta{position:relative;overflow:hidden;min-height:80vh;display:flex;align-items:center;background:var(--s1);border-top:1px solid var(--border)}
.cin-bg-glow{position:absolute;inset:0;background:radial-gradient(ellipse at 60% 50%,rgba(59,130,246,0.08) 0%,rgba(139,92,246,0.05) 40%,transparent 70%)}
.cin-lines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 79px,rgba(255,255,255,0.015) 79px,rgba(255,255,255,0.015) 80px)}
.cin-content{position:relative;z-index:1;max-width:680px;padding:7rem 5%}
.cin-tag{font-family:var(--mono);font-size:0.72rem;color:var(--purple);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:1.5rem;display:block}
.cin-h2{font-size:clamp(2.8rem,5vw,5rem);font-weight:900;letter-spacing:-0.05em;line-height:1.05;margin-bottom:1.5rem}
.cin-h2 em{font-style:normal;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.cin-body{color:var(--sub);font-size:1.05rem;line-height:1.85;margin-bottom:1.5rem}
.cin-trans{font-family:var(--mono);font-size:0.85rem;color:var(--muted);font-style:italic;margin-bottom:0.5rem}
.cin-hook{font-size:1.6rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:2rem;background:linear-gradient(135deg,#fff,var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.cin-visual-svgs{position:absolute;right:5%;top:50%;transform:translateY(-50%);opacity:0.12;z-index:0}

/* ============================================
   TRACKS PAGE
   ============================================ */
#tracks-hero{min-height:55vh;display:flex;align-items:center;padding:8rem 5% 5rem;position:relative;overflow:hidden;text-align:center;justify-content:center}
.tracks-grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(59,130,246,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.025) 1px,transparent 1px);background-size:60px 60px}
.tracks-hero-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:700px;height:400px;background:radial-gradient(ellipse,rgba(59,130,246,0.1) 0%,rgba(139,92,246,0.06) 50%,transparent 70%);pointer-events:none}
.tracks-hero-content{position:relative;z-index:1;max-width:700px}
.tracks-cards-section{padding:4rem 5% 7rem}
.tracks-cards-inner{max-width:1100px;margin:0 auto}

<!-- Temporary closing tags for commit 4. Next commit continues the full page. -->

</body>
</html>
