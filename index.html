<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exponential Community — Developer OS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050508;
  --s1:#0C0C14;
  --s2:#12121F;
  --blue:#3B82F6;
  --purple:#8B5CF6;
  --green:#10B981;
  --text:#F1F5F9;
  --sub:#94A3B8;
  --muted:#475569;
  --border:rgba(255,255,255,0.06);
  --border-active:rgba(59,130,246,0.3);
  --glow-blue:rgba(59,130,246,0.15);
  --glow-purple:rgba(139,92,246,0.12);
  --head:'Inter',sans-serif;
  --mono:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--head);font-size:16px;line-height:1.7;overflow-x:hidden;min-height:100vh}

/* CURSOR GLOW */
#cursor-glow{position:fixed;pointer-events:none;z-index:9999;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,0.06) 0%,transparent 70%);transform:translate(-50%,-50%);transition:left 0.6s ease,top 0.6s ease;top:50%;left:50%}

/* BOOT SCREEN */
#boot{position:fixed;inset:0;background:#000;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--mono)}
.boot-term{width:min(500px,90vw);text-align:left}
.boot-line{font-size:0.85rem;color:#3B82F6;line-height:2;opacity:0;animation:bootLine 0.4s ease forwards}
.boot-line.green{color:#10B981}
.boot-line.dim{color:#475569}
.boot-logo{margin-top:2.5rem;text-align:center;opacity:0;animation:fadeIn 1s 3.2s ease forwards}
.boot-logo-text{font-family:var(--head);font-size:2rem;font-weight:900;letter-spacing:-0.04em;background:linear-gradient(135deg,#fff,#3B82F6,#8B5CF6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none;filter:drop-shadow(0 0 40px rgba(59,130,246,0.5))}
.boot-skip{position:fixed;top:1.5rem;right:2rem;background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 16px;border-radius:6px;font-family:var(--mono);font-size:0.75rem;cursor:pointer;z-index:1001;transition:all 0.2s}
.boot-skip:hover{border-color:var(--blue);color:var(--blue)}
@keyframes bootLine{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeIn{from{opacity:0;filter:blur(20px)}to{opacity:1;filter:blur(0)}}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:0 5%;height:64px;background:rgba(5,5,8,0.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);transition:all 0.3s}
.nav-logo{font-weight:900;font-size:1.1rem;letter-spacing:-0.03em;background:linear-gradient(135deg,#fff 0%,var(--blue) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer}
.nav-links{display:flex;gap:0;list-style:none}
.nav-links li a{color:var(--muted);text-decoration:none;font-size:0.85rem;font-weight:500;padding:0 1rem;height:64px;display:flex;align-items:center;transition:color 0.2s;border-bottom:2px solid transparent;cursor:pointer}
.nav-links li a:hover,.nav-links li a.active{color:var(--text);border-bottom-color:var(--blue)}
.nav-right{display:flex;gap:0.75rem;align-items:center}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--sub);padding:8px 18px;border-radius:7px;font-family:var(--head);font-size:0.85rem;font-weight:500;cursor:pointer;transition:all 0.2s}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border:none;padding:9px 22px;border-radius:7px;font-family:var(--head);font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s;box-shadow:0 0 20px rgba(59,130,246,0.2)}
.btn-primary:hover{box-shadow:0 0 40px rgba(59,130,246,0.4);transform:translateY(-1px)}

/* PAGES */
.page{display:none;min-height:100vh;padding-top:64px}
.page.active{display:block}

/* GLOBAL SECTION */
section{padding:7rem 5%}
.inner{max-width:1100px;margin:0 auto}
.mono-tag{font-family:var(--mono);font-size:0.72rem;font-weight:500;letter-spacing:0.15em;text-transform:uppercase;color:var(--blue);margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.mono-tag::before{content:'>';color:var(--purple)}
.section-title{font-size:clamp(2.2rem,4vw,3.5rem);font-weight:800;letter-spacing:-0.04em;line-height:1.1;margin-bottom:1.2rem}
.section-sub{color:var(--sub);font-size:1.05rem;line-height:1.8;max-width:580px}

/* GLASS CARD */
.glass{background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:16px;transition:all 0.3s;position:relative;overflow:hidden}
.glass::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 30%,rgba(59,130,246,0.04) 0%,transparent 60%);opacity:0;transition:opacity 0.3s;pointer-events:none}
.glass:hover{border-color:rgba(59,130,246,0.25);box-shadow:0 0 40px rgba(59,130,246,0.08);transform:translateY(-2px)}
.glass:hover::before{opacity:1}

/* TAG/BADGE */
.tag{display:inline-flex;align-items:center;gap:6px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:var(--blue);font-family:var(--mono);font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;padding:4px 12px;border-radius:4px}
.tag.green{background:rgba(16,185,129,0.1);border-color:rgba(16,185,129,0.2);color:var(--green)}
.tag.purple{background:rgba(139,92,246,0.1);border-color:rgba(139,92,246,0.2);color:var(--purple)}
.tag.closed{background:rgba(71,85,105,0.1);border-color:rgba(71,85,105,0.2);color:var(--muted)}

/* SCROLL REVEAL */
.reveal{opacity:0;transform:translateY(24px);transition:opacity 0.6s ease,transform 0.6s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

/* ============================================
   HOME PAGE
   ============================================ */

/* HERO */
#home-hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;padding:8rem 5%}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(59,130,246,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.03) 1px,transparent 1px);background-size:80px 80px;z-index:0}
.hero-radial{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);width:900px;height:500px;background:radial-gradient(ellipse,rgba(59,130,246,0.1) 0%,rgba(139,92,246,0.05) 40%,transparent 70%);pointer-events:none;z-index:0}
.hero-content{position:relative;z-index:1;max-width:820px}
.hero-mono{font-family:var(--mono);font-size:0.78rem;color:var(--blue);letter-spacing:0.12em;margin-bottom:1.5rem;opacity:0;animation:fadeUp 0.8s 0.1s ease forwards}
h1.hero-h1{font-size:clamp(3.5rem,9vw,7rem);font-weight:900;letter-spacing:-0.05em;line-height:1;margin-bottom:1.5rem;opacity:0;animation:fadeUp 0.9s 0.2s ease forwards}
h1.hero-h1 em{font-style:normal;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{color:var(--sub);font-size:1.1rem;line-height:1.8;max-width:560px;margin:0 auto 2.5rem;opacity:0;animation:fadeUp 1s 0.3s ease forwards}
.hero-ctas{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;opacity:0;animation:fadeUp 1s 0.4s ease forwards}
.btn-hero{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border:none;padding:14px 32px;border-radius:8px;font-family:var(--head);font-size:1rem;font-weight:600;cursor:pointer;transition:all 0.3s;box-shadow:0 0 40px rgba(59,130,246,0.3)}
.btn-hero:hover{box-shadow:0 0 70px rgba(59,130,246,0.5);transform:translateY(-2px)}
.btn-hero-sec{background:transparent;border:1px solid rgba(255,255,255,0.12);color:var(--text);padding:14px 32px;border-radius:8px;font-family:var(--head);font-size:1rem;font-weight:500;cursor:pointer;transition:all 0.2s}
.btn-hero-sec:hover{border-color:var(--blue);background:rgba(59,130,246,0.05)}
.hero-proof{margin-top:2rem;font-family:var(--mono);font-size:0.78rem;color:var(--muted);opacity:0;animation:fadeUp 1s 0.5s ease forwards}
.hero-proof span{color:var(--green)}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

<!-- Temporary closing tags for commit 2. Next commit continues the full page. -->

</body>
</html>
